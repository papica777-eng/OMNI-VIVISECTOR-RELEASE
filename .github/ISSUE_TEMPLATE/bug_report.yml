name: 🚨 Enterprise Bug Report
description: Report an issue or engine crash in OMNI-VIVISECTOR
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        *Before reporting, please verify that your issue is not a sensitive security vulnerability. If it is a zero-day or bypass, DO NOT open this issue—see `SECURITY.md`.*
  - type: input
    id: version
    attributes:
      label: OMNI-VIVISECTOR Version
      description: What version of the setup or CLI are you running? (e.g., 8.2.0)
      placeholder: "8.2.0"
    validations:
      required: true
  - type: input
    id: license
    attributes:
      label: Enterprise License Prefix
      description: Provide ONLY the first 12 characters of your `sk_vortex_...` key.
      placeholder: "sk_vortex_A1B2..."
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide the exact CLI command or UI actions that caused the issue.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Crash Logs / Output
      description: Paste any error messages from the console or log files.
      render: bash
    validations:
      required: false
